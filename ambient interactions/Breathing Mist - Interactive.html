<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Breathing Mist — Interactive</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  background: #f4f6f8;
  overflow: hidden;
}
canvas { display: block; }
#hint {
  position: fixed;
  bottom: 16px;
  width: 100%;
  text-align: center;
  font-family: system-ui, monospace;
  font-size: 13px;
  color: #7a8896;
  opacity: 0.75;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">Move slowly • Faster = stronger flow • Click = soft vortex</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let w, h;
function resize() {
  w = canvas.width = innerWidth;
  h = canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

/* ================= MOUSE ================= */
const mouse = {
  x: w/2, y: h/2,
  px: w/2, py: h/2,
  vx: 0, vy: 0
};

addEventListener("mousemove", e => {
  mouse.px = mouse.x;
  mouse.py = mouse.y;
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.vx = mouse.x - mouse.px;
  mouse.vy = mouse.y - mouse.py;
});

let vortex = 0;
addEventListener("mousedown", () => vortex = 1);

/* ================= FIELD ================= */
const LINES = 120;
const POINTS = 100;
const field = [];

for (let i = 0; i < LINES; i++) {
  const y = (i / LINES) * h;
  const line = [];

  for (let j = 0; j < POINTS; j++) {
    line.push({
      x: (j / POINTS) * w,
      y,
      vy: 0
    });
  }

  field.push({
    baseY: y,
    phase: Math.random() * Math.PI * 2,
    points: line
  });
}

/* ================= ANIMATION ================= */
let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.003;

  ctx.fillStyle = "rgba(244,246,248,0.18)";
  ctx.fillRect(0, 0, w, h);

  ctx.lineWidth = 1;

  field.forEach(row => {
    ctx.beginPath();

    row.points.forEach((p, i) => {
      const dx = mouse.x - p.x;
      const dy = mouse.y - p.y;
      const dist = Math.sqrt(dx*dx + dy*dy) + 0.001;

      /* cursor flow influence */
      const speed = Math.sqrt(mouse.vx*mouse.vx + mouse.vy*mouse.vy);
      const influence = Math.exp(-dist * 0.01) * speed * 0.02;

      p.vy += (dy / dist) * influence;

      /* vortex on click */
      if (vortex > 0) {
        p.vy += Math.sin(dist * 0.03 - t * 4) * vortex * 0.12;
      }

      /* spring back */
      p.vy += (row.baseY - p.y) * 0.004;

      /* damping */
      p.vy *= 0.93;
      p.y += p.vy;

      /* ambient breathing */
      p.y += Math.sin(t + p.x * 0.01 + row.phase) * 0.12;

      if (i === 0) ctx.moveTo(p.x, p.y);
      else ctx.lineTo(p.x, p.y);
    });

    ctx.strokeStyle = "rgba(135,150,165,0.3)";
    ctx.stroke();
  });

  vortex *= 0.94;
}

animate();
</script>
</body>
</html>
