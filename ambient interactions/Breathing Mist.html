<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Breathing Mist Field</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  background: #f4f6f8;
  overflow: hidden;
}
canvas {
  display: block;
}
#hint {
  position: fixed;
  bottom: 16px;
  width: 100%;
  text-align: center;
  font-family: system-ui, monospace;
  font-size: 13px;
  color: #7a8896;
  opacity: 0.7;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">Move gently • Click to breathe</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let w, h;
function resize() {
  w = canvas.width = innerWidth;
  h = canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

const mouse = { x: w/2, y: h/2 };
addEventListener("mousemove", e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

let breath = 0;
addEventListener("mousedown", () => breath = 1);

/* ================= FIELD ================= */
const LINES = 140;
const POINTS = 90;
const field = [];

for (let i = 0; i < LINES; i++) {
  const y = (i / LINES) * h;
  const line = [];

  for (let j = 0; j < POINTS; j++) {
    line.push({
      x: (j / POINTS) * w,
      y,
      vy: 0
    });
  }

  field.push({
    baseY: y,
    points: line,
    phase: Math.random() * Math.PI * 2
  });
}

/* ================= ANIMATION ================= */
let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.004;

  ctx.fillStyle = "rgba(244,246,248,0.15)";
  ctx.fillRect(0, 0, w, h);

  ctx.lineWidth = 1;

  field.forEach(row => {
    ctx.beginPath();

    row.points.forEach((p, i) => {
      const dx = mouse.x - p.x;
      const dy = mouse.y - p.y;
      const dist = Math.sqrt(dx*dx + dy*dy) + 1;

      // gentle influence
      p.vy += (dy / dist) * 0.003;

      // breathing pulse
      if (breath > 0) {
        p.vy += Math.sin(dist * 0.02) * breath * 0.05;
      }

      // natural return
      p.vy += (row.baseY - p.y) * 0.004;
      p.vy *= 0.94;
      p.y += p.vy;

      // subtle wave motion
      p.y += Math.sin(t + p.x * 0.01 + row.phase) * 0.15;

      if (i === 0) ctx.moveTo(p.x, p.y);
      else ctx.lineTo(p.x, p.y);
    });

    ctx.strokeStyle = "rgba(140,155,170,0.25)";
    ctx.stroke();
  });

  breath *= 0.96;
}

animate();
</script>
</body>
</html>
